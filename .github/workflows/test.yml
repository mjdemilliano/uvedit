name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ test/

  type:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run mypy
        run: uv run mypy src/

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pip-audit
        run: uv run pip-audit --desc

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync

      - name: Run tests with coverage (Python 3.11)
        if: matrix.python-version == '3.11'
        run: uv run pytest test/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Run tests (Python ${{ matrix.python-version }})
        if: matrix.python-version != '3.11'
        run: uv run pytest test/ -v

  publish:
    name: Publish to PyPI
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
